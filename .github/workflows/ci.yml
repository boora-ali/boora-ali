name: CI

on:
  pull_request:
    branches:
      - dev

jobs:
  ci-control:
    name: CI Control
    runs-on: self-hosted
    outputs:
      skip: ${{ steps.skip.outputs.skip }}

    steps:
      - name: Detect skip marker
        id: skip
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          text="$PR_TITLE
          $PR_BODY"

          case "$text" in
            *"[skip ci]"*|*"[ci skip]"*)
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "CI skipped by PR marker."
              ;;
            *)
              echo "skip=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

  validate-branch-name:
    name: Validate Branch Name
    runs-on: self-hosted
    needs: [ci-control]
    if: needs.ci-control.outputs.skip != 'true'

    steps:
      - name: Enforce allowed source branch prefixes
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          case "$BRANCH_NAME" in
            feat/*|fix/*|dependabot/*)
              echo "Accepted branch: $BRANCH_NAME"
              ;;
            *)
              echo "Invalid branch name: $BRANCH_NAME"
              echo "Use feat/*, fix/*, or dependabot/* before opening a PR to dev."
              exit 1
              ;;
          esac

  lint-backend:
    name: Lint Backend
    runs-on: self-hosted
    needs: [ci-control, validate-branch-name]
    if: needs.ci-control.outputs.skip != 'true'

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install ruff
        run: pip install ruff==0.11.9

      - name: Ruff lint
        working-directory: backend
        run: ruff check .

      - name: Ruff format check
        working-directory: backend
        run: ruff format --check .

  lint-frontend:
    name: Lint Frontend
    runs-on: self-hosted
    needs: [ci-control, validate-branch-name]
    if: needs.ci-control.outputs.skip != 'true'

    steps:
      - uses: actions/checkout@v7

      - name: Clear stale Puppeteer cache
        run: rm -rf ~/.cache/puppeteer

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: frontend
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

  security-backend:
    name: Security Backend
    runs-on: self-hosted
    needs: [ci-control, validate-branch-name]
    if: needs.ci-control.outputs.skip != 'true'

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install security tools
        run: pip install bandit==1.8.3 pip-audit==2.9.0

      - name: Bandit SAST
        working-directory: backend
        run: bandit -r . -c pyproject.toml -ll -q

      - name: pip-audit (CVE check)
        working-directory: backend
        # PYSEC-2025-183: disputado pelos mantenedores do pyjwt — a responsabilidade
        # de enforçar tamanho mínimo de chave é da aplicação, não da biblioteca.
        # Sem fix version disponível. Revisitar quando pyjwt lançar patch.
        run: pip-audit -r requirements.txt --skip-editable --ignore-vuln PYSEC-2025-183

  security-frontend:
    name: Security Frontend
    runs-on: self-hosted
    needs: [ci-control, validate-branch-name]
    if: needs.ci-control.outputs.skip != 'true'

    steps:
      - uses: actions/checkout@v7

      - name: Clear stale Puppeteer cache
        run: rm -rf ~/.cache/puppeteer

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: frontend
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
        run: npm ci

      - name: npm audit
        working-directory: frontend
        run: npm audit --audit-level=high

  test-backend:
    name: Test Backend
    runs-on: self-hosted
    needs: [ci-control, lint-backend, security-backend]
    if: needs.ci-control.outputs.skip != 'true'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ${{ secrets.CI_POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.CI_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

      redis:
        image: valkey/valkey:9.0.3-alpine
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: config.test_settings
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: ${{ secrets.CI_POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.CI_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
          REDIS_URL: redis://localhost:6379/1
          CELERY_BROKER_URL: redis://localhost:6379/2
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY_CI }}
        run: python -m pytest --tb=short -q --cov=. --cov-report=term-missing --cov-fail-under=70

  test-frontend:
    name: Test Frontend
    runs-on: self-hosted
    needs: [ci-control, lint-frontend, security-frontend]
    if: needs.ci-control.outputs.skip != 'true'

    steps:
      - uses: actions/checkout@v7

      - name: Clear stale Puppeteer cache
        run: rm -rf ~/.cache/puppeteer

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: frontend
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
        run: npm ci

      - name: Run tests with coverage
        working-directory: frontend
        run: npm run test:coverage


