name: Build & Push Docker Images

on:
  push:
    branches:
      - dev

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build & Push to ghcr.io
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          cache-from: type=registry,ref=ghcr.io/boora-ali/backend:dev-latest
          cache-to: type=inline
          tags: |
            ghcr.io/boora-ali/backend:sha-${{ github.sha }}
            ghcr.io/boora-ali/backend:dev-latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          cache-from: type=registry,ref=ghcr.io/boora-ali/frontend:dev-latest
          cache-to: type=inline
          tags: |
            ghcr.io/boora-ali/frontend:sha-${{ github.sha }}
            ghcr.io/boora-ali/frontend:dev-latest
          build-args: |
            VITE_API_URL=/api
            VITE_GOOGLE_OAUTH_CLIENT_ID=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
            VITE_TURNSTILE_SITE_KEY=${{ secrets.TURNSTILE_SITE_KEY }}
