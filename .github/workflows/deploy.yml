name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy-control:
    name: Deploy Control
    runs-on: self-hosted
    outputs:
      skip: ${{ steps.skip.outputs.skip }}

    steps:
      - name: Detect skip marker
        id: skip
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          case "$COMMIT_MESSAGE" in
            *"[skip deploy]"*|*"[deploy skip]"*|*"[skip ci]"*|*"[ci skip]"*)
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "Deploy skipped by commit marker."
              ;;
            *)
              echo "skip=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

  deploy:
    name: Deploy to Contabo
    runs-on: self-hosted
    needs: [deploy-control]
    if: needs.deploy-control.outputs.skip != 'true'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd /root/bora-ali

            git remote set-url origin https://github.com/boora-ali/boora-ali.git
            git fetch https://${{ secrets.USER }}:${{ secrets.GH_PAT }}@github.com/boora-ali/boora-ali.git main
            git reset --hard FETCH_HEAD
            git clean -fd

            docker compose -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.prod.yml up -d --force-recreate
            docker image prune -f
