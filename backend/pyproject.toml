[tool.ruff]
line-length = 88
target-version = "py312"
exclude = ["**/migrations/**"]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I"]

[tool.ruff.lint.per-file-ignores]
"config/settings.py" = ["F403", "F405"]
"config/test_settings.py" = ["F403", "F405"]

[tool.bandit]
exclude_dirs = ["tests", "migrations"]
skips = ["B101"]
