<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="ba-title ba-desc">
  <title id="ba-title">Boora Ali</title>
  <desc id="ba-desc">Pin de localização com fita de marcação — marca do Boora Ali.</desc>

  <!--
    Conceito: pin de localização cujo recorte interno é uma fita de bookmark.
    Leitura dual — "marcar um lugar" + "marcar na memória / diário pessoal".
    Dois elementos, zero ruído.
  -->

  <!-- Corpo do pin -->
  <path
    fill="#D42028"
    d="M256 472
       C168 452 106 344 106 210
       A150 150 0 0 1 406 210
       C406 344 344 452 256 472Z"
  />

  <!-- Recorte: fita bookmark (retângulo com V invertido na base) -->
  <path
    fill="#FAF7F2"
    d="M218 138H294Q306 138 306 150V264L256 234L206 264V150Q206 138 218 138Z"
  />
</svg>
