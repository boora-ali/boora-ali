<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F4F7FB" />
    <title>Boora Ali offline</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #faf7f2 0%, #f1e9df 100%);
        color: #1a1208;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      }
      main {
        width: min(92vw, 28rem);
        padding: 1.5rem;
        border: 1px solid #e8e0d8;
        border-radius: 1.25rem;
        background: rgba(255, 255, 255, 0.8);
        box-shadow: 0 24px 80px rgba(26, 18, 8, 0.12);
        text-align: center;
      }
      img {
        width: 5rem;
        height: 5rem;
        object-fit: contain;
        margin-bottom: 1rem;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.5rem;
      }
      p {
        margin: 0;
        color: #6f5d4d;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/bora-ali-mark.svg" alt="Boora Ali" />
      <h1>Sem conexao no momento</h1>
      <p>Abra o app de novo quando estiver online para sincronizar suas ultimas mudancas.</p>
    </main>
  </body>
</html>
