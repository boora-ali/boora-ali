server {
  listen 80;
  server_name localhost;

  root /usr/share/nginx/html;
  index index.html;
  server_tokens off;

  client_max_body_size 11m;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

  location /admin/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  location /api/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # Proxy interno para VersityGW — mesmo padrão do prod (R2).
  # Django valida JWT e emite X-Accel-Redirect; nginx busca do storage internamente.
  # Requer AWS_S3_PUBLIC_ENDPOINT=http://storage:7070 no .env.dev para que a
  # URL assinada use o hostname interno do Docker (acessível ao nginx).
  location /_r2_proxy/ {
    internal;
    resolver 127.0.0.11 valid=30s;
    set $r2_target $upstream_http_x_accel_target;
    proxy_pass $r2_target;
    proxy_set_header Authorization "";
    add_header Cache-Control "private, max-age=31536000, immutable" always;
  }

  # Proxy para media files servidos pelo versitygw (S3 local) — mantido como fallback
  location /bora-ali/ {
    proxy_pass http://storage:7070/bora-ali/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 30s;
  }

  location /_tiles/ {
    proxy_pass https://tiles.openfreemap.org/;
    proxy_ssl_server_name on;
    resolver 1.1.1.1 valid=300s;
    proxy_set_header Host tiles.openfreemap.org;
    proxy_set_header Accept-Encoding "";
    proxy_hide_header Access-Control-Allow-Origin;
    add_header Access-Control-Allow-Origin * always;
    proxy_read_timeout 30s;
  }

  location /static/ {
    alias /staticfiles/;
    add_header Cache-Control "public, max-age=86400" always;
  }

  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location = /sw.js {
    try_files $uri =404;
    default_type application/javascript;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }

  location = /manifest.webmanifest {
    try_files $uri =404;
    default_type application/manifest+json;
    add_header Cache-Control "no-cache" always;
  }

  location = /offline.html {
    try_files $uri =404;
    add_header Cache-Control "no-cache" always;
  }

  location = /sitemap.xml {
    try_files $uri =404;
    default_type application/xml;
    add_header Cache-Control "public, max-age=3600" always;
  }

  location = /index.html {
    try_files $uri =404;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }

  # Public landing page and SPA fallback for client-side routes.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
