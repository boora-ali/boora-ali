limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
limit_conn_zone $binary_remote_addr zone=perip:10m;

# Per-request CSP nonce derived from nginx's unique $request_id.
# Injected into index.html's bundle <script> tag via sub_filter (see below).
# 'strict-dynamic' makes the browser trust any script the nonce'd bundle
# injects at runtime (Cloudflare Turnstile, Google GSI), so third-party
# inline scripts never need a hash. This survives every rebuild because
# nothing in the CSP depends on built asset contents.
map $request_id $csp_header {
  default "default-src 'self'; script-src 'nonce-$request_id' 'strict-dynamic' 'wasm-unsafe-eval' https: 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://accounts.google.com https://fonts.googleapis.com; img-src 'self' data: blob: https:; frame-src https://www.google.com https://accounts.google.com https://challenges.cloudflare.com; worker-src 'self' blob:; connect-src 'self' https://accounts.google.com https://*.r2.cloudflarestorage.com https://challenges.cloudflare.com https://static.cloudflareinsights.com https://tiles.openfreemap.org https://*.openfreemap.org https://fonts.openmaptiles.org; font-src 'self' https://fonts.gstatic.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';";
}

# Localhost access for SSH tunnel (admin only accessible from 127.0.0.1)
server {
  listen 80 default_server;
  server_name localhost;

  root /usr/share/nginx/html;
  index index.html;
  server_tokens off;

  location /admin/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_redirect off;
    proxy_read_timeout 60s;
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;
  }

  location /static/ {
    alias /staticfiles/;
    add_header Cache-Control "public, max-age=86400" always;
  }

  location = /sw.js {
    try_files $uri =404;
    default_type application/javascript;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header X-Content-Type-Options "nosniff" always;
  }

  location = /manifest.webmanifest {
    try_files $uri =404;
    default_type application/manifest+json;
    add_header Cache-Control "no-cache" always;
    add_header X-Content-Type-Options "nosniff" always;
  }

  location / {
    sub_filter '<script type="module"' '<script nonce="$request_id" type="module"';
    sub_filter_once off;
    add_header Content-Security-Policy $csp_header always;
    try_files $uri $uri/ /index.html;
  }
}

server {
  listen 80;
  server_name booraali.com.br www.booraali.com.br;
  return 301 https://booraali.com.br$request_uri;
}

server {
  listen 443 ssl;
  server_name www.booraali.com.br;
  ssl_certificate /etc/letsencrypt/live/booraali.com.br/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/booraali.com.br/privkey.pem;
  return 301 https://booraali.com.br$request_uri;
}

server {
  listen 443 ssl;
  server_name booraali.com.br;

  ssl_certificate /etc/letsencrypt/live/booraali.com.br/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/booraali.com.br/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  root /usr/share/nginx/html;
  index index.html;
  server_tokens off;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(self), microphone=(), camera=(self), payment=(), usb=(), fullscreen=(self)" always;
  add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
  add_header Cross-Origin-Resource-Policy "cross-origin" always;
  add_header Content-Security-Policy $csp_header always;

  client_max_body_size 11m;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml application/json application/javascript application/wasm application/xml+rss application/atom+xml image/svg+xml;

  location /admin/ {
    limit_conn perip 5;
    allow 127.0.0.1;
    deny all;
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;
  }

  location /api/auth/ {
    limit_req zone=auth burst=5 nodelay;
    limit_conn perip 10;
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;
  }

  location /api/ {
    limit_req zone=api burst=20 nodelay;
    limit_conn perip 20;
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;
  }

  location /static/ {
    alias /staticfiles/;
    add_header Cache-Control "public, max-age=86400" always;
    add_header X-Content-Type-Options "nosniff" always;
  }

  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Resource-Policy "cross-origin" always;
    add_header Content-Security-Policy $csp_header always;
  }

  location = /sw.js {
    try_files $uri =404;
    default_type application/javascript;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header X-Content-Type-Options "nosniff" always;
  }

  location = /manifest.webmanifest {
    try_files $uri =404;
    default_type application/manifest+json;
    add_header Cache-Control "no-cache" always;
    add_header X-Content-Type-Options "nosniff" always;
  }

  location = /offline.html {
    try_files $uri =404;
    add_header Cache-Control "no-cache" always;
    add_header X-Content-Type-Options "nosniff" always;
  }

  location = /sitemap.xml {
    try_files $uri =404;
    default_type application/xml;
    add_header Cache-Control "public, max-age=3600" always;
    add_header X-Content-Type-Options "nosniff" always;
  }

  location = /index.html {
    try_files $uri =404;
    # Inject the per-request nonce into the Vite bundle <script> tag so
    # 'strict-dynamic' can bootstrap. Vite emits `<script type="module" ...>`.
    sub_filter '<script type="module"' '<script nonce="$request_id" type="module"';
    sub_filter_once off;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), microphone=(), camera=(self), payment=(), usb=(), fullscreen=(self)" always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header Cross-Origin-Resource-Policy "cross-origin" always;
    add_header Content-Security-Policy $csp_header always;
  }

  location / {
    sub_filter '<script type="module"' '<script nonce="$request_id" type="module"';
    sub_filter_once off;
    add_header Content-Security-Policy $csp_header always;
    try_files $uri $uri/ /index.html;
  }
}
