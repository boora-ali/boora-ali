# nginx.conf — Coolify + Traefik
#
# Traefik termina TLS e roteia HTTP interno para nginx:80.
# Nginx nunca vê conexões TLS; nunca é exposto diretamente à internet.
#
# Fluxo:
#   Browser → Cloudflare → Traefik (TLS) → nginx:80 → backend:8000
#
# real_ip: restaura o IP real do cliente via X-Forwarded-For do Traefik
# para que rate limiting, logs e geo-bloqueio usem o IP correto.

limit_req_zone $binary_remote_addr zone=api:10m  rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
limit_conn_zone $binary_remote_addr zone=perip:10m;

# Nonce CSP derivado do $request_id único do nginx.
# 'strict-dynamic' faz o browser confiar em scripts injetados pelo bundle
# nonce'd (Turnstile, Google GSI) sem precisar de hashes por rebuild.
map $request_id $csp_header {
  default "default-src 'self'; script-src 'nonce-$request_id' 'strict-dynamic' 'wasm-unsafe-eval' https: 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://accounts.google.com https://fonts.googleapis.com; img-src 'self' data: blob: https:; frame-src https://www.google.com https://accounts.google.com https://challenges.cloudflare.com; worker-src 'self' blob:; connect-src 'self' https://accounts.google.com https://challenges.cloudflare.com https://static.cloudflareinsights.com https://tiles.openfreemap.org https://*.openfreemap.org https://fonts.openmaptiles.org; font-src 'self' https://fonts.gstatic.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';";
}

# Restaura o IP real via Traefik.
# Os CIDRs cobrem as redes bridge/overlay padrão do Docker.
set_real_ip_from 10.0.0.0/8;
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;
real_ip_header    X-Forwarded-For;
real_ip_recursive on;

# ─── Redirect www → bare (Traefik roteia www para cá via label) ──────────────

server {
  listen 80;
  server_name www.booraali.com.br;
  return 301 https://booraali.com.br$request_uri;
}

# ─── Servidor principal ───────────────────────────────────────────────────────

server {
  listen 80 default_server;
  server_name _;

  root  /usr/share/nginx/html;
  index index.html;
  server_tokens off;

  client_max_body_size 11m;

  # Traefik já envia X-Forwarded-Proto: https para todo tráfego terminado em TLS.
  # Django precisa desse header para gerar URLs absolutas corretas (SECURE_PROXY_SSL_HEADER).
  # Não sobrescrever aqui — deixar o header do Traefik passar ao backend.

  # Gzip — economiza banda para JS/CSS/JSON
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml application/json application/javascript
             application/wasm application/xml+rss application/atom+xml image/svg+xml;

  # Headers de segurança aplicados globalmente
  add_header X-Content-Type-Options           "nosniff"                        always;
  add_header X-Frame-Options                  "DENY"                           always;
  add_header X-XSS-Protection                 "1; mode=block"                  always;
  add_header Referrer-Policy                  "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy               "geolocation=(self), microphone=(), camera=(self), payment=(), usb=(), fullscreen=(self)" always;
  add_header Cross-Origin-Opener-Policy       "same-origin-allow-popups"        always;
  add_header Cross-Origin-Resource-Policy     "cross-origin"                    always;

  # ── Django Admin ────────────────────────────────────────────────────────────
  # IP allowlist removida: nginx está isolado na rede interna do Docker e nunca
  # é acessível diretamente pela internet. Proteção de acesso deve ser feita via:
  #   • Cloudflare WAF (regra de IP allowlist no painel)
  #   • ou Traefik middleware ipAllowList no docker-compose
  location /admin/ {
    limit_conn perip 5;
    proxy_pass         http://backend:8000;
    proxy_set_header   Host                $host;
    proxy_set_header   X-Real-IP           $remote_addr;
    proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto   $http_x_forwarded_proto;
    proxy_read_timeout 60s;
    proxy_hide_header  X-Powered-By;
    proxy_hide_header  Server;
  }

  # ── API de autenticação (rate limit agressivo) ───────────────────────────────
  location /api/auth/ {
    limit_req  zone=auth burst=5 nodelay;
    limit_conn perip 10;
    proxy_pass         http://backend:8000;
    proxy_set_header   Host                $host;
    proxy_set_header   X-Real-IP           $remote_addr;
    proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto   $http_x_forwarded_proto;
    proxy_read_timeout 60s;
    proxy_hide_header  X-Powered-By;
    proxy_hide_header  Server;
  }

  # ── API geral ────────────────────────────────────────────────────────────────
  location /api/ {
    limit_req  zone=api burst=20 nodelay;
    limit_conn perip 20;
    proxy_pass         http://backend:8000;
    proxy_set_header   Host                $host;
    proxy_set_header   X-Real-IP           $remote_addr;
    proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto   $http_x_forwarded_proto;
    proxy_read_timeout 60s;
    proxy_hide_header  X-Powered-By;
    proxy_hide_header  Server;
  }

  # ── Proxy interno R2 (X-Accel-Redirect) ─────────────────────────────────────
  # Acionado exclusivamente por media_views.py após validação JWT.
  # O browser nunca conecta ao R2 diretamente — sem CORS, sem URL expirando.
  location /_r2_proxy/ {
    internal;
    resolver 1.1.1.1 valid=30s;
    set $r2_target $upstream_http_x_accel_target;
    proxy_pass            $r2_target;
    proxy_ssl_server_name on;
    proxy_set_header      Authorization "";
    proxy_hide_header     x-amz-request-id;
    proxy_hide_header     x-amz-id-2;
    add_header Cache-Control         "private, max-age=31536000, immutable" always;
    add_header X-Content-Type-Options "nosniff"                              always;
  }

  # ── Arquivos estáticos Django (/static/) ─────────────────────────────────────
  location /static/ {
    alias /staticfiles/;
    add_header Cache-Control         "public, max-age=86400" always;
    add_header X-Content-Type-Options "nosniff"               always;
  }

  # ── Assets do Vite (hash imutável) ──────────────────────────────────────────
  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control                "public, max-age=31536000, immutable" always;
    add_header X-Content-Type-Options       "nosniff"                              always;
    add_header X-Frame-Options              "DENY"                                 always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin"      always;
    add_header Cross-Origin-Resource-Policy "cross-origin"                         always;
    add_header Content-Security-Policy      $csp_header                            always;
  }

  # ── Service Worker (nunca cacheado) ─────────────────────────────────────────
  location = /sw.js {
    try_files $uri =404;
    default_type application/javascript;
    add_header Cache-Control         "no-cache, no-store, must-revalidate" always;
    add_header X-Content-Type-Options "nosniff"                              always;
  }

  # ── Manifest PWA ─────────────────────────────────────────────────────────────
  location = /manifest.webmanifest {
    try_files $uri =404;
    default_type application/manifest+json;
    add_header Cache-Control         "no-cache" always;
    add_header X-Content-Type-Options "nosniff"  always;
  }

  # ── Offline fallback ─────────────────────────────────────────────────────────
  location = /offline.html {
    try_files $uri =404;
    add_header Cache-Control         "no-cache" always;
    add_header X-Content-Type-Options "nosniff"  always;
  }

  # ── Sitemap ──────────────────────────────────────────────────────────────────
  location = /sitemap.xml {
    try_files $uri =404;
    default_type application/xml;
    add_header Cache-Control         "public, max-age=3600" always;
    add_header X-Content-Type-Options "nosniff"               always;
  }

  # ── index.html (nonce CSP + no-cache) ───────────────────────────────────────
  location = /index.html {
    try_files $uri =404;
    sub_filter '<script type="module"' '<script nonce="$request_id" type="module"';
    sub_filter_once off;
    add_header Cache-Control                "no-cache, no-store, must-revalidate" always;
    add_header X-Content-Type-Options       "nosniff"                              always;
    add_header X-Frame-Options              "DENY"                                 always;
    add_header X-XSS-Protection             "1; mode=block"                        always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin"      always;
    add_header Permissions-Policy           "geolocation=(self), microphone=(), camera=(self), payment=(), usb=(), fullscreen=(self)" always;
    add_header Cross-Origin-Opener-Policy   "same-origin-allow-popups"             always;
    add_header Cross-Origin-Resource-Policy "cross-origin"                         always;
    add_header Content-Security-Policy      $csp_header                            always;
  }

  # ── SPA catch-all ────────────────────────────────────────────────────────────
  location / {
    sub_filter '<script type="module"' '<script nonce="$request_id" type="module"';
    sub_filter_once off;
    add_header Content-Security-Policy $csp_header always;
    try_files $uri $uri/ /index.html;
  }
}
