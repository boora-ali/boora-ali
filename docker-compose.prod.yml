services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bora_ali}
      POSTGRES_USER: ${POSTGRES_USER:-bora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - bora_ali_pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-bora} -d ${POSTGRES_DB:-bora_ali}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:9.0.3-alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 256M
    command: valkey-server --maxmemory 200mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    image: ghcr.io/boora-ali/backend:${IMAGE_TAG:-dev-latest}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 4096M
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://valkey:6379/0
      CELERY_BROKER_URL: redis://valkey:6379/1
      CELERY_RESULT_BACKEND: redis://valkey:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    volumes:
      - staticfiles:/app/staticfiles

  celery-worker:
    image: ghcr.io/boora-ali/backend:${IMAGE_TAG:-dev-latest}
    restart: unless-stopped
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 2048M
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://valkey:6379/0
      CELERY_BROKER_URL: redis://valkey:6379/1
      CELERY_RESULT_BACKEND: redis://valkey:6379/2
    command: celery -A config worker -l info -c 2 -Q default,celery
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  celery-beat:
    image: ghcr.io/boora-ali/backend:${IMAGE_TAG:-dev-latest}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 512M
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://valkey:6379/0
      CELERY_BROKER_URL: redis://valkey:6379/1
      CELERY_RESULT_BACKEND: redis://valkey:6379/2
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  frontend:
    image: ghcr.io/boora-ali/frontend:${IMAGE_TAG:-dev-latest}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - staticfiles:/staticfiles:ro
    depends_on:
      - backend

volumes:
  staticfiles:

  bora_ali_pgdata:
